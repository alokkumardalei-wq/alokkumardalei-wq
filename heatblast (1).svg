<style>
  .flame { transform-box: fill-box; transform-origin: bottom center; }
  .f1  { fill: #ff6600; animation: flicker1 2.8s ease-in-out infinite 0.0s; }
  .f2  { fill: #ff4400; animation: flicker2 3.2s ease-in-out infinite 0.4s; }
  .f3  { fill: #ff5500; animation: flicker1 2.6s ease-in-out infinite 0.8s; }
  .f4  { fill: #ff3300; animation: flicker3 3.4s ease-in-out infinite 1.2s; }
  .f5  { fill: #ff6600; animation: flicker2 2.9s ease-in-out infinite 0.2s; }
  .f6  { fill: #ff5500; animation: flicker1 3.1s ease-in-out infinite 0.6s; }
  .f7  { fill: #ff4400; animation: flicker3 2.7s ease-in-out infinite 1.0s; }
  .f8  { fill: #ff5500; animation: flicker2 3.3s ease-in-out infinite 0.35s; }
  .f9  { fill: #ff4400; animation: flicker1 2.85s ease-in-out infinite 0.75s; }
  .f10 { fill: #ff6600; animation: flicker3 3.0s ease-in-out infinite 1.4s; }
  .f11 { fill: #ff5500; animation: flicker2 2.75s ease-in-out infinite 0.55s; }
  .f12 { fill: #ff6600; animation: flicker1 3.2s ease-in-out infinite 0.9s; }
  .c1  { fill: #ffcc00; opacity:0.55; animation: flicker1 2.8s ease-in-out infinite 0.0s; }
  .c2  { fill: #ffee00; opacity:0.55; animation: flicker2 3.2s ease-in-out infinite 0.4s; }
  .c3  { fill: #ffe000; opacity:0.55; animation: flicker1 2.6s ease-in-out infinite 0.8s; }
  .c4  { fill: #ffcc00; opacity:0.55; animation: flicker3 3.4s ease-in-out infinite 1.2s; }
  .c5  { fill: #ffee00; opacity:0.55; animation: flicker2 2.9s ease-in-out infinite 0.2s; }
  .c6  { fill: #fff0a0; opacity:0.55; animation: flicker1 3.1s ease-in-out infinite 0.6s; }
  .c7  { fill: #fff5b0; opacity:0.55; animation: flicker3 2.7s ease-in-out infinite 1.0s; }
  .c8  { fill: #ffee00; opacity:0.55; animation: flicker2 3.3s ease-in-out infinite 0.35s; }
  .c9  { fill: #ffcc00; opacity:0.55; animation: flicker1 2.85s ease-in-out infinite 0.75s; }
  .c10 { fill: #ffee00; opacity:0.55; animation: flicker3 3.0s ease-in-out infinite 1.4s; }
  .c11 { fill: #fff0a0; opacity:0.55; animation: flicker2 2.75s ease-in-out infinite 0.55s; }
  .c12 { fill: #ffcc00; opacity:0.55; animation: flicker1 3.2s ease-in-out infinite 0.9s; }
  .e1 { fill:#ffcc00; animation: ember1 3.5s linear infinite 0.0s; }
  .e2 { fill:#ff8800; animation: ember2 4.0s linear infinite 0.6s; }
  .e3 { fill:#ffee00; animation: ember1 3.2s linear infinite 1.2s; }
  .e4 { fill:#ff9900; animation: ember2 3.8s linear infinite 0.3s; }
  .e5 { fill:#ffcc00; animation: ember1 4.2s linear infinite 1.8s; }
  .e6 { fill:#ff8800; animation: ember2 3.6s linear infinite 2.2s; }
  .lbl { fill:#ff6600; opacity:0.5; font-family:'Courier New',monospace; font-size:11px; letter-spacing:4px; }
  @keyframes flicker1 {
    0%  {opacity:0; transform:translateY(8px) scaleX(1);}
    15% {opacity:0.7;transform:translateY(-4px) scaleX(0.96);}
    40% {opacity:0.9;transform:translateY(2px) scaleX(1.02);}
    60% {opacity:0.6;transform:translateY(-6px) scaleX(0.97);}
    80% {opacity:0.8;transform:translateY(4px) scaleX(1.01);}
    100%{opacity:0; transform:translateY(8px) scaleX(1);}
  }
  @keyframes flicker2 {
    0%  {opacity:0; transform:translateY(6px) scaleX(1);}
    20% {opacity:0.8;transform:translateY(-6px) scaleX(0.95);}
    45% {opacity:0.6;transform:translateY(4px) scaleX(1.03);}
    65% {opacity:0.9;transform:translateY(-4px) scaleX(0.98);}
    85% {opacity:0.5;transform:translateY(8px) scaleX(1.01);}
    100%{opacity:0; transform:translateY(6px) scaleX(1);}
  }
  @keyframes flicker3 {
    0%  {opacity:0; transform:translateY(10px) scaleX(1);}
    10% {opacity:0.9;transform:translateY(-8px) scaleX(0.94);}
    35% {opacity:0.7;transform:translateY(6px) scaleX(1.04);}
    55% {opacity:0.85;transform:translateY(-2px) scaleX(0.96);}
    75% {opacity:0.6;transform:translateY(4px) scaleX(1.02);}
    100%{opacity:0; transform:translateY(10px) scaleX(1);}
  }
  @keyframes ember1 {
    0%  {opacity:0; transform:translate(0,0);}
    10% {opacity:0.9;}
    70% {opacity:0.6;}
    100%{opacity:0; transform:translate(-12px,-130px);}
  }
  @keyframes ember2 {
    0%  {opacity:0; transform:translate(0,0);}
    10% {opacity:0.8;}
    70% {opacity:0.4;}
    100%{opacity:0; transform:translate(14px,-120px);}
  }
</style>
