<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 130" width="860" height="130">
<style>
  .scan  { animation: scanLine 3s linear infinite; }
  .ring1 { fill:none; stroke:#00ff44; stroke-width:3; animation: pulse 4s ease-out infinite 0s; transform-box:fill-box; transform-origin:center; }
  .ring2 { fill:none; stroke:#88ffaa; stroke-width:1; animation: pulse 4s ease-out infinite 0.08s; transform-box:fill-box; transform-origin:center; }
  .ticks { animation: spin 8s linear infinite; transform-box:fill-box; transform-origin:center; }
  .core  { animation: corePulse 1.5s ease-in-out infinite; }
  .aura  { animation: auraPulse 2.5s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
  .heroT { animation: heroFlash 4s step-end infinite 0s; }
  .hud   { opacity:0.6; font-family:'Courier New',monospace; font-size:9px; letter-spacing:1.5px; fill:#00cc33; }
  @keyframes scanLine {
    0%  {transform:translateY(-4px);}
    100%{transform:translateY(134px);}
  }
  @keyframes pulse {
    0%  {opacity:0; transform:scale(1);}
    15% {opacity:0.9;}
    100%{opacity:0; transform:scale(3);}
  }
  @keyframes spin {
    from{transform:rotate(0deg);}
    to  {transform:rotate(360deg);}
  }
  @keyframes corePulse {
    0%,100%{opacity:0.5; r:2.5px;}
    50%    {opacity:1;   r:1.5px;}
  }
  @keyframes auraPulse {
    0%,100%{opacity:0.4; transform:scale(1);}
    50%    {opacity:0.8; transform:scale(1.15);}
  }
  @keyframes heroFlash {
    0%,60%,100%{opacity:0;} 70%,80%{opacity:1;} 85%,90%{opacity:0.6;} 95%{opacity:0;}
  }
</style>
<rect width="860" height="130" fill="#050d05"/>
<!-- grid -->
<line x1="0" y1="32"  x2="860" y2="32"  stroke="#00ff44" stroke-width="0.5" opacity="0.07"/>
<line x1="0" y1="65"  x2="860" y2="65"  stroke="#00ff44" stroke-width="0.5" opacity="0.07"/>
<line x1="0" y1="98"  x2="860" y2="98"  stroke="#00ff44" stroke-width="0.5" opacity="0.07"/>
<line x1="215" y1="0" x2="215" y2="130" stroke="#00ff44" stroke-width="0.5" opacity="0.07"/>
<line x1="430" y1="0" x2="430" y2="130" stroke="#00ff44" stroke-width="0.5" opacity="0.07"/>
<line x1="645" y1="0" x2="645" y2="130" stroke="#00ff44" stroke-width="0.5" opacity="0.07"/>
<!-- scan line -->
<rect class="scan" x="0" y="-4" width="860" height="4" fill="#00ff44" opacity="0.06"/>
<!-- HUD left -->
<text class="hud" x="30" y="30">OMNITRIX v3.0</text>
<text class="hud" x="30" y="46">ALIEN COUNT: 10</text>
<text class="hud" x="30" y="62">STATUS: READY</text>
<text class="hud" x="30" y="78">ENERGY: ████████░░</text>
<text class="hud" x="30" y="94">LOCK: OFF</text>
<line x1="20" y1="18" x2="20" y2="102" stroke="#00cc33" stroke-width="1" opacity="0.4"/>
<line x1="20" y1="18" x2="26" y2="18"  stroke="#00cc33" stroke-width="1" opacity="0.4"/>
<line x1="20" y1="102" x2="26" y2="102" stroke="#00cc33" stroke-width="1" opacity="0.4"/>
<!-- HUD right -->
<text class="hud" x="830" y="30"  text-anchor="end">WIELDER: ALOK</text>
<text class="hud" x="830" y="46"  text-anchor="end">SPECIES: HUMAN</text>
<text class="hud" x="830" y="62"  text-anchor="end">DNA: LOCKED</text>
<text class="hud" x="830" y="78"  text-anchor="end">TIMER: 10:00</text>
<text class="hud" x="830" y="94"  text-anchor="end">⬡ PLUMBER GRADE</text>
<line x1="840" y1="18" x2="840" y2="102" stroke="#00cc33" stroke-width="1" opacity="0.4"/>
<line x1="834" y1="18" x2="840" y2="18"  stroke="#00cc33" stroke-width="1" opacity="0.4"/>
<line x1="834" y1="102" x2="840" y2="102" stroke="#00cc33" stroke-width="1" opacity="0.4"/>
<!-- aura glow -->
<ellipse class="aura" cx="430" cy="65" rx="54" ry="54" fill="#00ff44" opacity="0.06"/>
<!-- outer ring -->
<circle cx="430" cy="65" r="50" fill="none" stroke="#004411" stroke-width="6"/>
<!-- bezel -->
<circle cx="430" cy="65" r="46" fill="#0a160a" stroke="#00cc33" stroke-width="1.5"/>
<!-- face -->
<circle cx="430" cy="65" r="40" fill="#0d200d"/>
<!-- inner ring -->
<circle cx="430" cy="65" r="34" fill="none" stroke="#003308" stroke-width="2"/>
<!-- spinning ticks -->
<g class="ticks">
  <line x1="430" y1="25" x2="430" y2="31" stroke="#00ff44" stroke-width="2" transform="rotate(0,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="31" stroke="#00ff44" stroke-width="2" transform="rotate(30,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="31" stroke="#00ff44" stroke-width="2" transform="rotate(60,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="31" stroke="#00ff44" stroke-width="2" transform="rotate(90,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="31" stroke="#00ff44" stroke-width="2" transform="rotate(120,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="31" stroke="#00ff44" stroke-width="2" transform="rotate(150,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="31" stroke="#00ff44" stroke-width="2" transform="rotate(180,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="31" stroke="#00ff44" stroke-width="2" transform="rotate(210,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="31" stroke="#00ff44" stroke-width="2" transform="rotate(240,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="31" stroke="#00ff44" stroke-width="2" transform="rotate(270,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="31" stroke="#00ff44" stroke-width="2" transform="rotate(300,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="31" stroke="#00ff44" stroke-width="2" transform="rotate(330,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="28" stroke="#008822" stroke-width="1" transform="rotate(15,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="28" stroke="#008822" stroke-width="1" transform="rotate(45,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="28" stroke="#008822" stroke-width="1" transform="rotate(75,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="28" stroke="#008822" stroke-width="1" transform="rotate(105,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="28" stroke="#008822" stroke-width="1" transform="rotate(135,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="28" stroke="#008822" stroke-width="1" transform="rotate(165,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="28" stroke="#008822" stroke-width="1" transform="rotate(195,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="28" stroke="#008822" stroke-width="1" transform="rotate(225,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="28" stroke="#008822" stroke-width="1" transform="rotate(255,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="28" stroke="#008822" stroke-width="1" transform="rotate(285,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="28" stroke="#008822" stroke-width="1" transform="rotate(315,430,65)"/>
  <line x1="430" y1="25" x2="430" y2="28" stroke="#008822" stroke-width="1" transform="rotate(345,430,65)"/>
</g>
<!-- hourglass symbol -->
<path d="M421,52 L439,52 L430,65 L439,78 L421,78 L430,65Z" fill="#00dd33" opacity="0.95"/>
<!-- centre -->
<circle cx="430" cy="65" r="4" fill="#002208"/>
<circle class="core" cx="430" cy="65" r="2.5" fill="#00ff44"/>
<!-- pulse rings -->
<circle class="ring1" cx="430" cy="65" r="40"/>
<circle class="ring2" cx="430" cy="65" r="40"/>
<!-- hero text flash -->
<text class="heroT" x="430" y="22"  text-anchor="middle" font-family="'Courier New',monospace" font-size="13" letter-spacing="8" fill="#00ff44">I T ' S   H E R O   T I M E</text>
<text class="heroT" x="430" y="122" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" letter-spacing="8" fill="#00ff44">I T ' S   H E R O   T I M E</text>
<!-- corner brackets -->
<path d="M8,8 L8,22 M8,8 L22,8"       stroke="#00cc33" stroke-width="1.5" fill="none" opacity="0.4"/>
<path d="M852,8 L838,8 M852,8 L852,22" stroke="#00cc33" stroke-width="1.5" fill="none" opacity="0.4"/>
<path d="M8,122 L8,108 M8,122 L22,122" stroke="#00cc33" stroke-width="1.5" fill="none" opacity="0.4"/>
<path d="M852,122 L838,122 M852,122 L852,108" stroke="#00cc33" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
