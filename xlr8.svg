<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="800" height="150">
  <defs>
    <linearGradient id="xlrBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000a1a"/>
      <stop offset="100%" stop-color="#001430"/>
    </linearGradient>
    <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00eeff" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="xlrGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="speedBlur">
      <feGaussianBlur stdDeviation="3 1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="150" fill="url(#xlrBg)"/>

  <!-- Speed lines on ground -->
  <line x1="0" y1="118" x2="800" y2="118" stroke="#003366" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="122" x2="800" y2="122" stroke="#002255" stroke-width="0.5" opacity="0.3"/>

  <!-- Background speed streaks (static) -->
  <line x1="0" y1="60" x2="600" y2="60" stroke="#001a33" stroke-width="12" opacity="0.4"/>
  <line x1="0" y1="75" x2="500" y2="75" stroke="#001a33" stroke-width="8" opacity="0.3"/>
  <line x1="0" y1="45" x2="400" y2="45" stroke="#001a33" stroke-width="6" opacity="0.25"/>

  <!-- Speed trail lines — animated wipe -->
  <rect x="0" y="55" width="0" height="10" fill="#00ccff" opacity="0.5" rx="5">
    <animate attributeName="width" values="0;600;800" dur="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.3;0" dur="0.6s" repeatCount="indefinite"/>
    <animate attributeName="x" values="0;0;200" dur="0.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="68" width="0" height="7" fill="#0088ff" opacity="0.4" rx="3">
    <animate attributeName="width" values="0;500;700" dur="0.6s" repeatCount="indefinite" begin="0.05s"/>
    <animate attributeName="opacity" values="0.4;0.2;0" dur="0.6s" repeatCount="indefinite" begin="0.05s"/>
  </rect>
  <rect x="0" y="43" width="0" height="5" fill="#00eeff" opacity="0.3" rx="3">
    <animate attributeName="width" values="0;450;680" dur="0.6s" repeatCount="indefinite" begin="0.08s"/>
    <animate attributeName="opacity" values="0.3;0.15;0" dur="0.6s" repeatCount="indefinite" begin="0.08s"/>
  </rect>
  <rect x="0" y="82" width="0" height="4" fill="#0055cc" opacity="0.25" rx="2">
    <animate attributeName="width" values="0;400;640" dur="0.6s" repeatCount="indefinite" begin="0.12s"/>
    <animate attributeName="opacity" values="0.25;0.1;0" dur="0.6s" repeatCount="indefinite" begin="0.12s"/>
  </rect>

  <!-- XLR8 body — zipping across screen -->
  <g filter="url(#speedBlur)">
    <!-- Body trail copies (motion blur effect) -->
    <g opacity="0.15">
      <ellipse cx="-60" cy="80" rx="22" ry="32" fill="#0088ff">
        <animate attributeName="cx" values="-80;780" dur="0.6s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g opacity="0.25">
      <ellipse cx="-40" cy="80" rx="22" ry="32" fill="#0099ff">
        <animate attributeName="cx" values="-60;800" dur="0.6s" repeatCount="indefinite" begin="0.02s"/>
      </ellipse>
    </g>

    <!-- Main XLR8 body -->
    <g>
      <animate attributeName="transform" type="translate" values="-100,0;900,0" dur="0.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.1 0 0.3 1"/>

      <!-- Tail/wheel base -->
      <ellipse cx="0" cy="105" rx="18" ry="10" fill="#0055aa" opacity="0.9"/>
      <!-- Wheel spin -->
      <circle cx="0" cy="105" r="9" fill="#003388">
        <animateTransform attributeName="transform" type="rotate" values="0,0,105;360,0,105" dur="0.15s" repeatCount="indefinite"/>
      </circle>
      <line x1="-9" y1="105" x2="9" y2="105" stroke="#0088ff" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" values="0,0,105;360,0,105" dur="0.15s" repeatCount="indefinite"/>
      </line>

      <!-- Body -->
      <ellipse cx="0" cy="78" rx="20" ry="30" fill="#0077cc"/>

      <!-- Helmet/Head -->
      <ellipse cx="0" cy="52" rx="22" ry="20" fill="#0066bb"/>
      <!-- Helmet visor -->
      <ellipse cx="0" cy="50" rx="14" ry="10" fill="#00ccff" opacity="0.9"/>
      <!-- Eyes inside visor -->
      <ellipse cx="-5" cy="49" rx="4" ry="4" fill="#ffffff"/>
      <ellipse cx="5" cy="49" rx="4" ry="4" fill="#ffffff"/>
      <ellipse cx="-5" cy="49" rx="2" ry="3" fill="#003399"/>
      <ellipse cx="5" cy="49" rx="2" ry="3" fill="#003399"/>

      <!-- Helmet fin -->
      <path d="M-8 35 Q0 18 8 35" fill="#005599" stroke="#0088cc" stroke-width="1"/>

      <!-- Arms streaming back (speed pose) -->
      <path d="M-18 70 Q-40 65 -55 60" stroke="#0077cc" stroke-width="8" stroke-linecap="round" fill="none"/>
      <path d="M18 70 Q40 65 55 60" stroke="#0077cc" stroke-width="8" stroke-linecap="round" fill="none"/>

      <!-- Omnitrix on chest -->
      <ellipse cx="0" cy="82" rx="8" ry="8" fill="#111"/>
      <ellipse cx="0" cy="82" rx="6" ry="6" fill="#00dd00"/>
      <ellipse cx="0" cy="82" rx="4" ry="4" fill="#111"/>
      <ellipse cx="0" cy="82" rx="2" ry="2" fill="#00ff44"/>

      <!-- Speed glow -->
      <ellipse cx="0" cy="78" rx="25" ry="35" fill="#00aaff" opacity="0.2"/>
    </g>
  </g>

  <!-- Label -->
  <text x="400" y="142" text-anchor="middle" font-family="monospace" font-size="13" fill="#00ccff" filter="url(#xlrGlow)">
    ⚡ XLR8 — Running at the speed of deployment ⚡
    <animate attributeName="opacity" values="0.5;1;0.5" dur="0.6s" repeatCount="indefinite"/>
  </text>
</svg>
